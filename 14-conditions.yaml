- name: print number is greater than 10 or not
  hosts: local
  connection: local
  vars:
    my_number: 15
  tasks:
  - name: check number is greater than 10 or not
    ansible.builtin.debug:
      msg: "number is greater than 10"
    when: my_number > 10
  
  - name: check number is less than or equal to 10
    ansible.builtin.debug:
      msg: "number is less than or equal to 10"
    when: my_number <= 10

